name: Edge App Checks
description: Builds, lints, formats, and tests a Screenly Edge App.

inputs:
  bun-version:
    description: Bun version to use
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: |
        echo "::group::Install dependencies"
        bun install --frozen-lockfile
        echo "::endgroup::"

    - name: Check formatting
      shell: bash
      run: |
        echo "::group::Check formatting"
        bun run format:check
        echo "::endgroup::"

    - name: Lint
      shell: bash
      run: |
        echo "::group::Lint"
        bun run lint
        echo "::endgroup::"

    - name: Build
      shell: bash
      run: |
        echo "::group::Build"
        bun run build
        echo "::endgroup::"

    - name: Test
      shell: bash
      run: |
        echo "::group::Test"
        bun run test
        echo "::endgroup::"
